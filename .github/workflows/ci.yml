name: Build and test application

on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create spotifyAppCredentials.json
        run: echo "${{ secrets.SPOTIFY_CREDENTIALS_JSON }}" > Backend/BandFounder/BandFounder.Api/spotifyAppCredentials.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Frontend/BandFounder/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: Frontend/BandFounder

      - name: Run tests
        run: npm test
